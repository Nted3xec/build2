name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      release_url:
        description: 'URL Release'
        required: true
        type: string
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: string
      tag:
        description: 'Tag Build'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Download Project
        run: |
          echo "📥 Downloading from: ${{ github.event.inputs.release_url }}"
          curl -L -o project.zip "${{ github.event.inputs.release_url }}/download/project.zip"
          ls -la project.zip
      
      - name: Extract Project
        run: |
          mkdir -p project
          unzip -o project.zip -d project/
          ls -la project/
      
      - name: Check pubspec.yaml
        run: |
          if [ ! -f "project/pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi
          echo "✅ Flutter project verified!"
      
      - name: Get Dependencies
        working-directory: project
        run: flutter pub get
      
      - name: Build APK
        working-directory: project
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: project/build/app/outputs/apk/**/*.apk
          retention-days: 7
          if-no-files-found: error
