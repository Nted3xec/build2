name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      release_url:
        description: 'URL Release'
        required: true
        type: string
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: string
      tag:
        description: 'Tag'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Download Project
        run: |
          curl -L -o project.zip "${{ github.event.inputs.release_url }}/download/project.zip"
          unzip -o project.zip -d project/
          ls -la project/
      
      - name: Build APK
        run: |
          cd project
          flutter pub get
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-apk
          path: project/build/app/outputs/apk/**/*.apk
