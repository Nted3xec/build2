name: Web to APK

on:
  workflow_dispatch:  # ← INI HARUS ADA!
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install PWA2APK
        run: npm install -g pwa2apk
      
      - name: Download Icon
        run: |
          curl -L -o icon.png "${{ github.event.inputs.icon_url }}"
      
      - name: Build APK
        run: |
          pwa2apk "${{ github.event.inputs.web_url }}" \
            --name "${{ github.event.inputs.app_name }}" \
            --icon "icon.png" \
            --output app.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: web2apk
          path: app.apk
